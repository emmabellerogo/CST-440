; PlatformIO Configuration for Face Detection (96x96 grayscale)
; Arduino Nano 33 BLE Sense
; NOTE: This board has no camera. For real camera input use a board with
; a camera (e.g. ESP32-CAM) or feed 96x96 images via serial/another source.

[env:nano33ble]
platform = nordicnrf52
board = nano33ble
framework = arduino

; Libraries
lib_deps =
    https://github.com/tensorflow/tflite-micro-arduino-examples#main

; Build flags: include path to training output (face_model.h)
build_flags =
    -DTF_LITE_STATIC_MEMORY
    -I../training
    -O2

; Monitor settings
monitor_speed = 115200
