; =============================================================================
; PlatformIO Configuration — Hand Gesture Detection
; Arduino Nano 33 BLE Sense (nRF52840, 256 KB SRAM)
; Camera: ArduCAM Mini 2MP Plus (OV2640) — SPI + I2C
;
; Wiring (identical to your face detection project):
;   VCC   -> 5V   (onboard AMS1117-3.3 LDO steps down to 3.3V for sensor)
;   GND   -> GND
;   SDA   -> A4   (3.3V I2C)
;   SCL   -> A5   (3.3V I2C)
;   MOSI  -> 11   (3.3V SPI)
;   MISO  -> 12   (3.3V SPI)
;   SCK   -> 13   (3.3V SPI)
;   CS    -> 10   (see CAM_CS in main.cpp)
;
; Project structure:
;   gesture_project/
;     platformio.ini
;     extra_scripts.py          <- same one from face detection project
;     include/
;       memorysaver.h           <- same one from face detection project
;     src/
;       main.cpp
;       hagrid_tiny_64_gray_int8.tflite
;       gesture_model.h         <- generated from .tflite (xxd -i)
; =============================================================================

; ---------------------------------------------------------------------------
; [platformio] global section — applies to ALL environments
; ---------------------------------------------------------------------------
[platformio]
; FIX: "No such file or directory" during compilation.
; TFLite Micro has deeply nested source paths that exceed macOS/Windows path
; length limits when the project lives inside a long home directory path like
; /Users/emmarogoveanu/Documents/PlatformIO/Projects/gesture_project/.pio/...
; Moving the build output to /tmp/pio_build (a short root path) fixes this.
; On Windows change this to: build_dir = C:\pio_build
build_dir = /tmp/pio_build

; ---------------------------------------------------------------------------
; [env:nano33ble] board environment
; ---------------------------------------------------------------------------
[env:nano33ble]
platform  = nordicnrf52
board     = nano33ble
framework = arduino

; --- Libraries (identical to face detection project) ---
lib_deps =
    ArduCAM/ArduCAM @ ^1.0.0
    https://github.com/tensorflow/tflite-micro-arduino-examples#main

; --- Build flags ---
; -DOV2640_MINI_2MP_PLUS   : selects correct ArduCAM sensor driver
;                            (also set via include/memorysaver.h)
; -DTF_LITE_STATIC_MEMORY  : disables dynamic allocation in TFLite Micro
; -DTENSOR_ARENA_KB=150    : 150 KB arena (fits in 256 KB SRAM)
; -DNUM_CLASSES=3          : like, dislike, palm
; -DCONF_THRESH_PCT=80     : minimum confidence % to accept a detection
; -DMARGIN_THRESH_PCT=15   : min gap between top-1 and top-2 predictions
; -DCONSENSUS_FRAMES=2     : require N consecutive frames before trigger
; -DCOOLDOWN_MS=1500       : ms between detections (state machine cooldown)
build_flags =
    -DOV2640_MINI_2MP_PLUS
    -DTF_LITE_STATIC_MEMORY
    -DTENSOR_ARENA_KB=150
    -DNUM_CLASSES=3
    -DCONF_THRESH_PCT=80
    -DMARGIN_THRESH_PCT=15
    -DCONSENSUS_FRAMES=2
    -DCOOLDOWN_MS=1500
    -O2

; --- Serial monitor ---
monitor_speed   = 115200
; monitor_port is intentionally unset — PlatformIO auto-detects on macOS.
; On macOS the Nano enumerates as /dev/cu.usbmodem<XXXX>, NOT /dev/ttyACM0.
; If auto-detect fails, find your port with: ls /dev/cu.usbmodem*
; then uncomment and set the line below:
; monitor_port = /dev/cu.usbmodem14101
monitor_filters = time

; --- Same extra_scripts as face detection project ---
extra_scripts = extra_scripts.py